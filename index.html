<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Liquid Glass</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="background"></div>

  <div class="glass-card">
    <h1>Liquid Glass</h1>
    <p>Настоящий glass эффект с distortion</p>
    <button>Кнопка</button>
  </div>

  <!-- SVG фильтр -->
  <svg style="display:none">
    <filter id="liquid">
      <feTurbulence
        type="fractalNoise"
        baseFrequency="0.01 0.01"
        numOctaves="2"
        seed="92"
        result="noise"
      />

      <feDisplacementMap
        in="SourceGraphic"
        in2="noise"
        scale="35"
        xChannelSelector="R"
        yChannelSelector="G"
      />
    </filter>
  </svg>

</body>
</html>
